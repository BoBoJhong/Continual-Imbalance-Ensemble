sampling_strategies:
  undersampling:
    method: "TomekLinks"
    params:
      sampling_strategy: "auto"
      n_jobs: -1
      
  oversampling:
    method: "ADASYN"
    params:
      sampling_strategy: "auto"
      n_neighbors: 5
      random_state: 42
      n_jobs: -1
      
  hybrid:
    method: "SMOTEENN"
    params:
      smote:
        sampling_strategy: "auto"
        k_neighbors: 5
        random_state: 42
        n_jobs: -1
      enn:
        n_neighbors: 3
        kind_sel: "all"
        n_jobs: -1

# Alternative sampling methods
alternative_methods:
  smote:
    method: "SMOTE"
    params:
      sampling_strategy: "auto"
      k_neighbors: 5
      random_state: 42
      n_jobs: -1
      
  random_undersampling:
    method: "RandomUnderSampler"
    params:
      sampling_strategy: "auto"
      random_state: 42
      replacement: false
      
  random_oversampling:
    method: "RandomOverSampler"
    params:
      sampling_strategy: "auto"
      random_state: 42
