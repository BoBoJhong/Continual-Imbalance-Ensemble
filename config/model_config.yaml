lightgbm:
  base_params:
    objective: "binary"
    metric: "auc"
    verbosity: -1
    seed: 42
    deterministic: true
    force_col_wise: true
    boosting_type: "gbdt"
  
  imbalance_params:
    is_unbalance: true
  
  param_grid:
    num_leaves: [31, 50, 100]
    max_depth: [5, 7, 10, -1]
    learning_rate: [0.01, 0.05, 0.1]
    n_estimators: [100, 200, 500]
    min_child_samples: [20, 50, 100]
    subsample: [0.8, 1.0]
    colsample_bytree: [0.8, 1.0]
    reg_alpha: [0.0, 0.1, 1.0]
    reg_lambda: [0.0, 0.1, 1.0]

xgboost:
  base_params:
    objective: "binary:logistic"
    eval_metric: "auc"
    seed: 42
    tree_method: "hist"
    verbosity: 0
  
  imbalance_params:
    scale_pos_weight: "auto"  # Calculated as: n_negative / n_positive
  
  param_grid:
    max_depth: [3, 5, 7]
    learning_rate: [0.01, 0.05, 0.1]
    n_estimators: [100, 200, 500]
    min_child_weight: [1, 3, 5]
    subsample: [0.8, 1.0]
    colsample_bytree: [0.8, 1.0]
    gamma: [0, 0.1, 0.2]
    reg_alpha: [0.0, 0.1, 1.0]
    reg_lambda: [0.0, 0.1, 1.0]

catboost:
  base_params:
    objective: "Logloss"
    eval_metric: "AUC"
    random_seed: 42
    verbose: false
    
  imbalance_params:
    auto_class_weights: "Balanced"
    
  param_grid:
    depth: [4, 6, 8]
    learning_rate: [0.01, 0.05, 0.1]
    iterations: [100, 200, 500]
    l2_leaf_reg: [1, 3, 5]
    border_count: [32, 64, 128]

logistic_regression:
  base_params:
    solver: "lbfgs"
    max_iter: 1000
    random_state: 42

  imbalance_params:
    class_weight: "balanced"

  param_grid:
    C: [0.01, 0.1, 1.0, 10.0]
    penalty: ["l2"]
    solver: ["lbfgs", "saga"]
    max_iter: [500, 1000, 2000]

hyperparameter_tuning:
  method: "RandomizedSearchCV"  # or "GridSearchCV"
  n_iter: 50
  cv: 5
  scoring: "roc_auc"
  n_jobs: -1
  verbose: 1
  refit: true
